<!-- Create New Password Form: shared across signup and reset flows -->
<form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="form-container">
    <!-- New Password -->
    <app-input label="New Password" type="password" formControlName="password" placeholder="Enter new password" />

    <!-- Confirm Password -->
    <app-input label="Confirm Password" type="password" formControlName="rePassword"
        placeholder="Confirm your password" />

    <!-- Cross-field mismatch error -->
    @if (passwordForm.errors?.['mismatch'] &&
    passwordForm.get('rePassword')?.touched) {
    <small class="error-msg">Passwords do not match.</small>
    }

    <!-- Submit button: label changes based on flow -->
    <div class="btn-container">
        <app-button [label]="flow() === AuthFlow.Signup ? 'Create Account' : 'Reset Password'" type="submit"
            [isLoading]="isLoading()" [disabled]="passwordForm.invalid" />
    </div>
</form>
