<!-- Reset Password: state-driven flow -->
<div class="auth-section">
    @if (currentStep() === ResetPasswordStep.SendEmail) {
    <div class="auth-header">
        <button
            routerLink="/auth/login"
            class="back-btn"
        >
            <i class="pi pi-arrow-left"></i>
        </button>
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-description">
            Don't worry, we will help you recover your account.
        </p>
    </div>
    }

    <!-- Step content -->
    <div class="form-container">
        @switch (currentStep()) { @case (ResetPasswordStep.SendEmail) {
        <app-send-email
            [flow]="AuthFlow.Reset"
            [isLoading]="isLoading()"
            (submitted)="onSendEmail($event)"
        />
        } @case (ResetPasswordStep.PasswordResetSent) {
        <app-password-reset-sent
            [email]="email()"
            (back)="goBack()"
            (createAccount)="onRegisterNavigate()"
        />
        } }
    </div>
</div>
