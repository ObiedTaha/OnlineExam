<div class="questions-page">
    @if (!isLoading()) {
        <div class="header-section">
            <div class="progress-bar-wrapper">
                <app-progres-bar
                    [current]="currentIndex() + 1"
                    [total]="totalQuestions()"
                    [title]="examTitle()">
                </app-progres-bar>
            </div>
            <div class="timer-wrapper">
                <app-progres-time [duration]="duration()" (onTimeUp)="finishExam()"></app-progres-time>
            </div>
        </div>

        @if (questions().length > 0) {
            <div class="question-container">
                <h2 class="question-text">{{ currentQuestion().text }}</h2>

                <div class="answers-list">
                    @for (item of currentQuestion().answers; track item.id) {
                        <div class="answer-item" [class.selected]="selectedAnswer() === item.id">
                            <p-radioButton
                                [name]="'question-' + currentQuestion().id"
                                [value]="item.id"
                                [(ngModel)]="selectedAnswer"
                                (ngModelChange)="onAnswerSelect($event)"
                                [inputId]="'ans-' + item.id">
                            </p-radioButton>
                            <label [for]="'ans-' + item.id">{{ item.text }}</label>
                        </div>
                    }
                </div>
            </div>

            <div class="navigation-footer">
                <button
                    pButton
                    label="Previous"
                    icon="pi pi-chevron-left"
                    class="p-button-outlined btn-prev"
                    [disabled]="currentIndex() === 0"
                    (click)="prevQuestion()">
                </button>

                @if (currentIndex() < totalQuestions() - 1) {
                    <button
                        pButton
                        label="Next"
                        icon="pi pi-chevron-right"
                        iconPos="right"
                        class="btn-next"
                        [disabled]="!selectedAnswer()"
                        (click)="nextQuestion()">
                    </button>
                } @else {
                    <button
                        pButton
                        label="Finish"
                        icon="pi pi-check"
                        iconPos="right"
                        class="btn-next"
                        [disabled]="!selectedAnswer()"
                        (click)="finishExam()">
                    </button>
                }
            </div>
        } @else {
            <div class="no-questions">
                <p>No questions available for this exam.</p>
            </div>
        }
    } @else {
        <div class="skeleton-container">
            <div class="header-skeleton">
                <p-skeleton width="70%" height="2rem" styleClass="mb-2"></p-skeleton>
                <p-skeleton width="40%" height="1rem" styleClass="mb-4"></p-skeleton>
                <p-skeleton width="100%" height="12px" borderRadius="6px"></p-skeleton>
            </div>
            <div class="question-skeleton mt-5">
                <p-skeleton width="90%" height="3rem" styleClass="mb-5"></p-skeleton>
                @for (i of [1,2,3,4]; track i) {
                    <p-skeleton width="100%" height="60px" borderRadius="12px" styleClass="mb-3"></p-skeleton>
                }
            </div>
        </div>
    }
</div>
