<form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="info-form">
  <div class="row">
    <div class="field-group">
      <label for="firstName">First name</label>
      @if (loading()) {
        <p-skeleton width="100%" height="45px"></p-skeleton>
      } @else {
        <input
          pInputText
          id="firstName"
          formControlName="firstName"
          placeholder="Enter your first name"
        />
      }
    </div>
    <div class="field-group">
      <label for="lastName">Last name</label>
      @if (loading()) {
        <p-skeleton width="100%" height="45px"></p-skeleton>
      } @else {
        <input
          pInputText
          id="lastName"
          formControlName="lastName"
          placeholder="Enter your last name"
        />
      }
    </div>
  </div>

  <div class="field-group">
    <label for="username">Username</label>
    @if (loading()) {
      <p-skeleton width="100%" height="45px"></p-skeleton>
    } @else {
      <div class="input-wrapper">
        <input
          pInputText
          id="username"
          formControlName="username"
          class="disabled-input"
        />
      </div>
    }
  </div>

  <div class="field-group">
    <div class="label-with-action">
      <label for="email">Email</label>
      <button type="button" class="action-link" (click)="changeEmail()">
        <i class="pi pi-pencil"></i> Change
      </button>
    </div>
    @if (loading()) {
      <p-skeleton width="100%" height="45px"></p-skeleton>
    } @else {
      <div class="input-wrapper">
        <input pInputText id="email" formControlName="email" type="email" class="disabled-input" />
      </div>
    }
  </div>

  <div class="field-group">
    <label for="phone">Phone</label>
    @if (loading()) {
      <p-skeleton width="100%" height="45px"></p-skeleton>
    } @else {
      <div class="phone-input-container">
        <div class="country-selector">
          <img
            src="https://flagcdn.com/w20/eg.png"
            alt="EG flag"
            class="flag-icon"
          />
          <span>EG(+20)</span>
          <i class="pi pi-chevron-down"></i>
        </div>
        <input
          pInputText
          id="phone"
          formControlName="phone"
          placeholder="1012345678"
        />
      </div>
    }
  </div>

  <div class="form-actions">
    <button
      type="button"
      class="delete-btn"
      (click)="deleteAccount()"
    >
      Delete My Account
    </button>
    <button
      pButton
      type="submit"
      class="save-btn"
      [loading]="loading()"
      [disabled]="profileForm.invalid || !profileForm.dirty"
    >
      Save Changes
    </button>
  </div>
</form>
<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="confirm-dialog-content">
      <div class="warning-icon-wrapper">
        <i class="pi pi-exclamation-triangle warning-icon"></i>
      </div>
      <h3 class="confirm-title">{{ message.header }}</h3>
      <p class="confirm-message">{{ message.message }}</p>
      <p class="confirm-submessage">This action is permanent and cannot be undone.</p>
    </div>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="confirm-footer">
      <button
        pButton
        type="button"
        label="Cancel"
        class="cancel-btn"
        (click)="confirmationService.close()"
      ></button>
      <button
        pButton
        type="button"
        label="Yes, delete"
        class="confirm-delete-btn"
        (click)="confirmDelete()"
      ></button>
    </div>
  </ng-template>
</p-confirmDialog>
