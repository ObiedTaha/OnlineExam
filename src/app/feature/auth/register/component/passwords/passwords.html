<section>


    <div class=" ">

        <!-- ── Stepper ── -->
        <div class="flex items-center mb-8" id="stepper">
            <!-- Step 1: done -->
            <div class="diamond bg-blue-600"></div>
            <div class="connector solid"></div>

            <!-- Step 2: active -->
            <div class="diamond bg-blue-600"></div>
            <div class="connector solid"></div>

            <!-- Step 3: future -->
            <div class="diamond bg-blue-600"></div>
            <div class="connector solid"></div>

            <!-- Step 4: future -->
            <div class="diamond bg-blue-600 ring-8 ring-blue-100"></div>
        </div>

        <!-- ── Heading ── -->
        <h1 class="text-4xl font-bold text-gray-900 mb-1">Create Account</h1>
        <h2 class="text-2xl font-bold text-blue-600 mb-4">Create a strong password</h2>

        <form>
            <div class="grid gap-6 mb-6 md:grid">
                <div>
                    <label for="company" class="block mb-2.5 text-sm font-medium text-heading">Password <span

                    <input type="password" id="password"

                        placeholder="********" required />
                </div>
                <div>
                    <label for="phone" class="block mb-2.5 text-sm font-medium text-heading">Confirm Password <span
                            class="text-red-500">*</span></label>
                    <input type="password" id="confirmPassword"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="********" required />
                </div>
            </div>


            <div class="flex justify-center mt-12">
                <button type="submit"
                    class="flex items-center justify-center gap-2 text-white w-full m-auto border border-brand bg-brand focus:ring-4 focus:ring-brand-medium shadow-xs font-medium rounded-none text-sm px-4 py-2.5">

                </button>
            </div>
        </form>






    </div>
