<section>


    <div class=" ">

        <!-- ── Stepper ── -->
        <div class="flex items-center mb-8" id="stepper">
            <!-- Step 1: done -->
            <div class="diamond bg-blue-600"></div>
            <div class="connector solid"></div>

            <!-- Step 2: active -->
            <div class="diamond bg-blue-600"></div>
            <div class="connector solid"></div>

            <!-- Step 3: future -->
            <div class="diamond bg-blue-600 ring-4 ring-blue-100"></div>
            <div class="connector dashed"></div>

            <!-- Step 4: future -->
            <div class="diamond border-2 border-gray-300 bg-white"></div>
        </div>

        <!-- ── Heading ── -->
        <h1 class="text-4xl font-bold text-gray-900 mb-1">Create Account</h1>
        <h2 class="text-2xl font-bold text-blue-600 mb-4">Tell us more about you</h2>

        <form>
            <div class="grid gap-6 mb-6 md:grid-cols-2">
                <div>
                    <label for="first_name" class="block mb-2.5 text-sm font-medium text-heading">First name <span class="text-red-500">*</span></label>
                    <input type="text" id="first_name"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="Obaid" required />
                </div>
                <div>
                    <label for="last_name" class="block mb-2.5 text-sm font-medium text-heading">Last name <span class="text-red-500">*</span></label>
                    <input type="text" id="last_name"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="Taha" required />
                </div>
            </div>
            <div class="grid gap-6 mb-6 md:grid">
                <div>
                    <label for="company" class="block mb-2.5 text-sm font-medium text-heading">Username <span class="text-red-500">*</span></label>
                    <input type="text" id="company"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="user123" required />
                </div>
                <div>
                    <label for="phone" class="block mb-2.5 text-sm font-medium text-heading">Phone</label>
                    <input type="tel" id="phone"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="1210225555"   />
                </div>

            </div>


        </form>







        <!-- ── Verify Button ── -->
        <div class="flex justify-center mt-12">
            <button type="submit"
                class="flex items-center justify-center gap-2 text-gray-500 w-full m-auto border border-brand bg-blue-50 focus:ring-4 focus:ring-brand-medium shadow-xs font-medium rounded-none text-sm px-4 py-2.5">
                Next
                <i class="pi pi-angle-right"></i>
            </button>
        </div>





    </div>

</section>
