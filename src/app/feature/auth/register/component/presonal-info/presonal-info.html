<section>
  <div class=" ">
    <!-- ── Stepper ── -->
    <div class="flex items-center mb-8" id="stepper">
      
      <div class="diamond bg-blue-600"></div>
      <div class="connector solid"></div>

      
      <div class="diamond bg-blue-600"></div>
      <div class="connector solid"></div>

      
      <div class="diamond bg-blue-600 ring-8 ring-blue-100"></div>
      <div class="connector dashed"></div>

   
      <div class="diamond border-2 border-gray-300 bg-white"></div>
    </div>

    <!-- ── Heading ── -->
    <h1 class="text-4xl font-bold text-gray-900 mb-1">Create Account</h1>
    <h2 class="text-2xl font-bold text-blue-600 mb-4">Tell us more about you</h2>

    <form>
      <div class="grid gap-6 mb-6 md:grid-cols-2">
        <div>
          <label for="first_name" class="block mb-2.5 text-sm font-medium text-heading">First name <span
              class="text-red-500">*</span></label>
          <input type="text" id="first_name"
            class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
            placeholder="Obaid" required />
        </div>
        <div>
          <label for="last_name" class="block mb-2.5 text-sm font-medium text-heading">Last name <span
              class="text-red-500">*</span></label>
          <input type="text" id="last_name"
            class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
            placeholder="Taha" required />
        </div>
      </div>
      <div class="grid gap-6 mb-6 md:grid">
        <div>
          <label for="company" class="block mb-2.5 text-sm font-medium text-heading">Username <span
              class="text-red-500">*</span></label>
          <input type="text" id="company"
            class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
            placeholder="user123" required />
        </div>
        
        <div>
          <label for="phone" class="block mb-2.5 text-sm font-medium text-heading">Phone</label>
          <!-- <input type="tel" id="phone"
                 class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                 placeholder="1210225555"/> -->

          <div class="flex items-center shadow-xs">

            <button type="button"
              class="inline-flex items-center shrink-0 z-10 text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 text-sm px-4 py-2.5 focus:outline-none">
              <svg class="w-4 h-4 me-1.5" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <clipPath id="eg-clip">
                    <circle cx="8" cy="8" r="7" />
                  </clipPath>
                </defs>
                <g clip-path="url(#eg-clip)">
                  <rect x="0" y="0" width="16" height="5.33" fill="#CE1126" />
                  <rect x="0" y="5.33" width="16" height="5.34" fill="#FFFFFF" />
                  <rect x="0" y="10.67" width="16" height="5.33" fill="#000000" />
                  <path
                    d="M6.5 6.2 L6.2 8.8 L7 8.6 L8 9.2 L9 8.6 L9.8 8.8 L9.5 6.2 L9 6.5 L8.5 6.2 L8 6.5 L7.5 6.2 L7 6.5 Z"
                    fill="#C09300" />
                  <rect x="7.4" y="8.2" width="1.2" height="0.5" fill="#C09300" />
                </g>
                <circle cx="8" cy="8" r="7" fill="none" stroke="#e5e5e5" stroke-width="0.5" />
              </svg>
              +20
              <img class="px-2" src="img/upDowen.svg" alt="Up Down Arrow">
            </button>

            <div class="relative w-full">
              <input type="phone" id="phone-input"
                class="w-full z-20 bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:outline-none focus:ring-1 focus:ring-brand focus:border-brand block w-full px-3 py-2.5 placeholder:text-body"
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890" required />
            </div>
          </div>

        </div>
      </div>
      <div class="flex justify-center mt-12">
        <button type="submit"
          class="flex items-center justify-center gap-2 text-gray-500 w-full m-auto border border-brand bg-blue-50 focus:ring-4 focus:ring-brand-medium shadow-xs font-medium rounded-none text-sm px-4 py-2.5">
          Next
          <i class="pi pi-angle-right"></i>
        </button>
      </div>
    </form>
  </div>

</section>
