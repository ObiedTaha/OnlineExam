<section>


    <div class=" ">



        <!-- ── Heading ── -->
        <h1 class="text-4xl font-bold text-gray-900 mb-1">Create a New Password</h1>
        <p class="text-sm text-gray-500 mb-4">Create a new strong password for your account.</p>

        <form>
            <div class="grid gap-6 mb-6 md:grid">
                <div>
                    <label for="company" class="block mb-2.5 text-sm font-medium text-heading">New Password </label>
                    <input type="password" id="password"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="********" required />
                </div>
                <div>
                    <label for="phone" class="block mb-2.5 text-sm font-medium text-heading">Confirm New Password </label>
                    <input type="password" id="confirmPassword"
                        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm  focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
                        placeholder="********" required />
                </div>
            </div>


            <div class="flex justify-center mt-12">
                <button type="submit"
                    class="flex items-center justify-center gap-2 text-white w-full m-auto border border-brand bg-brand focus:ring-4 focus:ring-brand-medium shadow-xs font-medium rounded-none text-sm px-4 py-2.5">
                    Reset Password
                </button>
            </div>
        </form>

        <p class=" text-gray-400 text-center text-sm m-auto pt-8 font-medium  select-none">Don’t have an account?
            <a [routerLink]="'/auth/signUp'" class="text-fg-brand hover:underline"> Create yours </a>




    </div>

</section>
