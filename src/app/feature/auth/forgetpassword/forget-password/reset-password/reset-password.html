<section class="">
    <!-- arrow left  -->
    <a [routerLink]="'/auth/signUp/forgotPassword'"
        class="border border-2 px-3 py-2 w-14  flex items-center gap-2 text-gray-500 mb-4">
        <img src="img/icons/move-left.svg" alt="">

    </a>
    <!-- ── Heading ── -->
    <h1 class="text-2xl font-bold  mb-1">Password Reset Sent</h1>
    <p class=" mt-4 text-sm">We have sent a password reset link to: <br>
        <a [routerLink]="" class="text-fg-brand hover:underline">user@example.com.</a>
    </p>
    <p class=" text-sm my-5">Please check your inbox and follow the <br> instructions to reset your password.
    </p>
    <p class="text-gray-500 text-sm">If you don’t see the email within a few minutes, <br> check your spam or junk
        folder.
    </p>
    <p class=" text-gray-400 text-sm m-auto pt-8 font-medium  select-none">Don’t have an account?
        <a [routerLink]="'/auth/signUp'" class="text-fg-brand hover:underline"> Create yours </a>
    </p>

</section>
